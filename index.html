<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pencatatan Keuangan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/feather-icons"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link rel="stylesheet" href="CSS/style.css" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#2b3543" />
  </head>
  <body>
    <nav>
      <a href="#">
        <i class="fa-solid fa-table-columns"></i>
        Dashboard
      </a>
      <a href="#pemasukan">
        <i class="fa-solid fa-money-bill-trend-up"></i>
        Pemasukan
      </a>

      <a href="#pengeluaran">
        <i class="fa-solid fa-money-bill-transfer"></i>
        Pengeluaran
      </a>

      <a href="#laporan">
        <i class="fa-solid fa-chart-line"></i>
        Laporan
      </a>
    </nav>
    <div class="judul">
      <h1>Pencatatan Duit</h1>
    </div>
    <main class="wadah-aplikasi">
      <section id="dashboard">
        <h2>Dashboard</h2>
        <div class="kartu-saldo">
          <h3>Total Saldo</h3>
          <p class="nominal-saldo" id="total-saldo">RP 0</p>
        </div>

        <div class="grup-kartu-ringkasan">
          <div class="kartu pemasukan">
            <h4>Pemasukan</h4>
            <p id="total-pemasukan">Rp 0</p>
          </div>
          <div class="kartu pengeluaran">
            <h4>Pengeluaran</h4>
            <p id="total-pengeluaran">Rp 0</p>
          </div>
        </div>
      </section>

      <hr />

      <section id="form-transaksi">
        <h3>Tambah Transaksi Baru</h3>

        <div class="area-scan">
          <label for="input-kamera" class="tombol-scan">
            <i class="fa-solid fa-camera"></i> Scan Struk / Nota
          </label>
          <input
            type="file"
            id="input-kamera"
            accept="image/*"
            capture="environment"
            style="display: none"
          />
          <p id="status-scan" class="status-scan"></p>
        </div>
        <form id="formulir-keuangan">
          <div class="grup-input">
            <label for="deskripsi">Keterangan / Catatan</label>
            <input
              type="text"
              id="deskripsi"
              placeholder="Misal: Beli bakso, Gaji bulanan"
              required
            />
          </div>

          <div class="grup-input">
            <label for="nominal">Nominal (Rp)</label>
            <input
              type="number"
              id="nominal"
              placeholder="Contoh: 50000"
              required
            />
          </div>

          <div class="grup-input">
            <label for="jenis">Jenis Transaksi</label>
            <select id="jenis" required>
              <option value="pemasukan">Pemasukan (Uang Masuk)</option>
              <option value="pengeluaran">Pengeluaran (Uang Keluar)</option>
            </select>
          </div>

          <button type="submit" class="tombol-simpan">Simpan Transaksi</button>
        </form>
      </section>

      <hr />

      <section id="riwayat">
        <h3>Riwayat Transaksi</h3>
        <ul id="daftar-transaksi" class="list-transaksi">
          <li class="data-kosong">Belum ada transaksi dicatat.</li>
        </ul>
      </section>
    </main>

    <script>
      feather.replace();
    </script>

    <script src="JS/script.js"></script>
  </body>
</html>
